name: build

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
  workflow_dispatch:

# Minimum permissions; specific jobs widen as needed for signing/attestation.
permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_BRIDGE: ghcr.io/unbornaztecking/even-terminal-sandbox
  IMAGE_PROXY:  ghcr.io/unbornaztecking/even-terminal-sandbox-egress

jobs:
  build:
    name: build, sbom, sign
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write          # push to ghcr
      id-token: write          # cosign keyless OIDC + provenance
      attestations: write      # actions/attest-build-provenance

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: bridge
            context: .
            dockerfile: Dockerfile
            image_env: IMAGE_BRIDGE
          - name: proxy
            context: ./proxy
            dockerfile: proxy/Dockerfile
            image_env: IMAGE_PROXY

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0
      - uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Resolve image ref
        id: ref
        run: |
          image="${{ env[matrix.image_env] }}"
          echo "image=$image" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
        with:
          images: ${{ steps.ref.outputs.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=long

      - name: Log in to ghcr.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4 # v6.15.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
          build-args: |
            SOURCE_COMMIT=${{ github.sha }}

      - name: Generate CycloneDX SBOM (syft)
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action@9246b90769f852b3a8921f330c59e0b3f439d6e9 # v0.20.1
        with:
          image: ${{ steps.ref.outputs.image }}@${{ steps.build.outputs.digest }}
          format: cyclonedx-json
          artifact-name: sbom-${{ matrix.name }}-${{ github.sha }}.cdx.json
          output-file: sbom-${{ matrix.name }}.cdx.json

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@d7d6bc7722e3daa8354c50bcb52f4837da5e9b6a # v3.8.1

      - name: Sign image (keyless OIDC)
        if: github.event_name != 'pull_request'
        run: |
          cosign sign --yes \
            "${{ steps.ref.outputs.image }}@${{ steps.build.outputs.digest }}"

      - name: Attest SBOM
        if: github.event_name != 'pull_request'
        run: |
          cosign attest --yes \
            --predicate sbom-${{ matrix.name }}.cdx.json \
            --type cyclonedx \
            "${{ steps.ref.outputs.image }}@${{ steps.build.outputs.digest }}"

      - name: Generate build-provenance attestation (SLSA L3)
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@db473fddc028af60658334401dc6fa3ffd8669fd # v2.3.0
        with:
          subject-name: ${{ steps.ref.outputs.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
