name: build

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
  workflow_dispatch:

# Minimum permissions; specific jobs widen as needed for signing/attestation.
permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_BRIDGE: ghcr.io/unbornaztecking/even-terminal-sandbox
  IMAGE_PROXY:  ghcr.io/unbornaztecking/even-terminal-sandbox-egress

jobs:
  build:
    name: build, sbom, sign
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write          # push to ghcr
      id-token: write          # cosign keyless OIDC + provenance
      attestations: write      # actions/attest-build-provenance

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: bridge
            context: .
            dockerfile: Dockerfile
            image_env: IMAGE_BRIDGE
          - name: proxy
            context: ./proxy
            dockerfile: proxy/Dockerfile
            image_env: IMAGE_PROXY

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Resolve image ref
        id: ref
        run: |
          image="${{ env[matrix.image_env] }}"
          echo "image=$image" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ steps.ref.outputs.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=long

      - name: Log in to ghcr.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
          build-args: |
            SOURCE_COMMIT=${{ github.sha }}

      - name: Generate CycloneDX SBOM (syft)
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ steps.ref.outputs.image }}@${{ steps.build.outputs.digest }}
          format: cyclonedx-json
          artifact-name: sbom-${{ matrix.name }}-${{ github.sha }}.cdx.json
          output-file: sbom-${{ matrix.name }}.cdx.json

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image (keyless OIDC)
        if: github.event_name != 'pull_request'
        run: |
          cosign sign --yes \
            "${{ steps.ref.outputs.image }}@${{ steps.build.outputs.digest }}"

      - name: Attest SBOM
        if: github.event_name != 'pull_request'
        run: |
          cosign attest --yes \
            --predicate sbom-${{ matrix.name }}.cdx.json \
            --type cyclonedx \
            "${{ steps.ref.outputs.image }}@${{ steps.build.outputs.digest }}"

      - name: Generate build-provenance attestation (SLSA L3)
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ steps.ref.outputs.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
